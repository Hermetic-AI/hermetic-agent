# OpenAgent 容器化部署 — 镜像驱动版 (不依赖 Dockerfile)
#
# 与 docker-compose.yml 的区别:
#   - 不 build, 镜像从 registry 直接 pull
#   - tag 通过环境变量 (或 .env) 注入:
#       OPENAGENT_HUB_IMAGE=ghcr.io/<your-org>/openagent-hub:1.0.0
#       OPENCODE_SANDBOX_IMAGE=ghcr.io/<your-org>/opencode-sandbox:1.0.0
#   - policy.json 已 bake 进 opencode-sandbox 镜像, 改 model/key 走 admin API
#
# 用法 (跟原 compose 并存, 互不覆盖):
#   docker compose -f docker-compose.yml -f docker-compose.image.yml config
#   docker compose -f docker-compose.yml -f docker-compose.image.yml up -d
#   # 或者直接:
#   docker compose -f docker-compose.image.yml --env-file .env up -d
#
# 启动: docker compose -f docker-compose.image.yml --env-file .env pull
#       docker compose -f docker-compose.image.yml --env-file .env up -d
# 验证: curl http://localhost:18000/ready
# 聊天: curl -X POST http://localhost:18000/agent/chat -H "Content-Type: application/json" \
#         -d '{"message":"你好"}'
#
# 架构:
#   openagent-hub  (L1~L3)  :8000
#       ↓ 调 SDK
#   opencode-1      (L4 sandbox 容器)  :7777 (health) / :7778 (admin) / :14096 (opencode serve)
#
# 关键点:
#   - 不再 build, 镜像由 CI 推到 registry, 这里只 pull
#   - policy.json 已 bake 进 opencode-sandbox 镜像; 想改 model/key/url:
#       走 admin API  →  POST /admin/policy  (合并到 runtime overlay)
#                       POST /admin/env     (覆盖 env, 含 KEY)
#                       POST /admin/reload  (触发 SIGTERM, supervisor 1s 内拉起)
#     或走 Hub 代理:  POST /agent/admin/opencode/opencode-1/policy[/env][/reload]
#   - 凭证走 env 挂载, 不引入 egress 代理
#   - workspace bind mount 到 host 绝对路径
#   - skill 走 ro bind mount
#   - 容器根 FS --read-only, tmpfs 给 /tmp
#   - 1 hub + 1 opencode 节点 (要加就复制 service 块, 改 container_name + hostname)
#
# 调试端口 (生产环境删掉):
#   http://localhost:14096/doc                    opencode 原生 OpenAPI Swagger
#   http://localhost:7778/docs                    admin API Swagger
#   POST http://localhost:7778/admin/policy       改 model
#   POST http://localhost:7778/admin/env          改 KEY
#   POST http://localhost:7778/admin/reload       触发 reload

services:
  # ============================================================
  # 1. OpenAgent Hub (主服务, L1~L3, Sanic + scenarios + skills)
  # ============================================================
  openagent-hub:
    image: ${OPENAGENT_HUB_IMAGE:-openagent:dev}
    # 始终从 registry 拉, 镜像源 = 唯一可信源
    pull_policy: always
    container_name: openagent-hub
    restart: unless-stopped
    # 把 .env 整个读进容器 (pydantic-settings 用)
    env_file:
      - path: .env
        required: false
    ports:
      - "18000:8000"
    environment:
      # ---- LLM 凭证 (model 字符串决定用哪个 provider, 见 §5.8) ----
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # OpenAI 兼容 (用 openai/* 时填, 推荐 — DeepSeek/Qwen/GLM/Ollama/自建)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      # ---- skill 业务 API ----
      - FLIGHT_API_KEY=${FLIGHT_API_KEY:-}
      # ---- 内部: opencode 节点位置 ----
      - OPENCODE_NODES=http://opencode-1:14096
      - ROUTING_STRATEGY=sticky_session
      # ---- 日志 ----
      - PYTHONUNBUFFERED=1
      - AGENT_SCHEDULER_LOG_LEVEL=${AGENT_SCHEDULER_LOG_LEVEL:-INFO}
      - AGENT_SCHEDULER_LOG_FORMAT=${AGENT_SCHEDULER_LOG_FORMAT:-json}
      - AGENT_SCHEDULER_LOG_LLM_PAYLOAD=${AGENT_SCHEDULER_LOG_LLM_PAYLOAD:-true}
    depends_on:
      opencode-1:
        condition: service_healthy
    networks: [sandbox-net]

  # ============================================================
  # 2. opencode 节点 (L4 sandbox 容器, 1 个 — 要加就复制)
  # ============================================================
  opencode-1:
    image: ${OPENCODE_SANDBOX_IMAGE:-opencode-sandbox:dev}
    pull_policy: always
    container_name: opencode-1
    hostname: opencode-1
    restart: unless-stopped
    # 容器安全加固
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges
    # 资源限制
    mem_limit: 2g
    cpus: "2.0"
    pids_limit: 128
    # 临时目录 (容器根 FS --read-only, 写都走 tmpfs)
    tmpfs:
      - /tmp:size=200m,mode=1777
      - /root/.config:size=50m,mode=0755
      - /root/.local:size=100m,mode=0755
    # LLM 凭证 + workspace 位置
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - FLIGHT_API_KEY=${FLIGHT_API_KEY:-}
      - WORKSPACE_CWD=${WORKSPACE_HOST_PATH:-/work/tenant-A/project-1}
      - OPENCODE_PORT=14096
      - OPENCODE_HOST=0.0.0.0
      - HEALTH_PORT=7777
    volumes:
      # 主 workspace (rw) — host 绝对路径 bind 到容器同路径
      - ${WORKSPACE_HOST_PATH:-./work/tenant-A/project-1}:${WORKSPACE_HOST_PATH:-/work/tenant-A/project-1}
      # skill 源 (ro, 中心服务的 skill 目录)
      - ${SKILLS_SHARED_DIR:-./work/shared/skills}:/work/shared/skills:ro
      # policy.json 已 bake 进镜像, 不再 bind mount
      # 改 policy 走 admin API → 写到 /tmp/opencode-sandbox/policy.runtime.json
      # (named volume 持久化, recreate 不丢)
      - opencode-1-runtime:/tmp/opencode-sandbox
    networks: [sandbox-net]
    # 调试期: 暴露 opencode serve + admin API 到 host
    # 生产环境删掉 ports 这一段, sandbox 不应直接对外
    ports:
      - "14096:14096"
      - "7778:7778"
    # healthcheck (镜像里也声明了, 这里再写一遍方便 `docker inspect` 看)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7777/healthz"]
      interval: 5s
      timeout: 2s
      start_period: 10s
      retries: 3

volumes:
  opencode-1-runtime:
    # 命名 volume, 容器 recreate 时保留 runtime overlay
    # 清理: docker compose -f docker-compose.image.yml down -v

networks:
  sandbox-net:
    driver: bridge
    name: openagent-sandbox-net
