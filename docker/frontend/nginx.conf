# hermetic_agent Frontend nginx 配置
#
# 关键点:
#   1. SPA 路由: try_files 兜底到 index.html, 走前端 react-router
#   2. /api 反代: 转发到 Hub 容器 (hermetic-agent:8000), 配合 docker compose service 名
#   3. SSE 长连接 (/api/agent/chat/stream):
#        - 关闭 proxy_buffering
#        - 关掉 proxy_cache
#        - 长 proxy_read timeout (跟 Sanic REQUEST_TIMEOUT=600s 对齐)
#        - 透传上游头 (Host / X-Forwarded-* / X-Real-IP)
#   4. 静态资源 30d 缓存 (文件名带 hash 的, 强缓存安全)
#   5. gzip + 常见 mime type
#   6. 容器根 FS 通常 read_only, 把 /var/cache/nginx /var/run /var/log 走 tmpfs (compose 侧处理)

server {
    listen       13000;
    listen  [::]:13000;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;

    # ---- 静态资源长缓存 (vite build 出来带 hash, 内容变了 URL 也变) ----
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ---- /api 反代到 Hub ----
    # P8 SSE: 必须关掉 buffering / cache, 加长 read timeout, 透传头
    location /api/ {
        proxy_pass         http://hermetic-agent:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # 关键: SSE 路径关掉 buffering + cache, 走 stream
        proxy_buffering    off;
        proxy_cache        off;
        # 跟 Sanic REQUEST_TIMEOUT=600s 对齐
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        # 不让 nginx 改 Connection 头, 透传后端的 keep-alive
        proxy_set_header   Connection        "";
    }

    # ---- SSE 单独显式 (上面 /api/ 已经覆盖, 这里是文档说明) ----
    # location = /api/agent/chat/stream {
    #     proxy_pass http://hermetic-agent:8000/agent/chat/stream;
    #     proxy_buffering off;
    #     proxy_cache off;
    #     proxy_read_timeout 600s;
    #     proxy_set_header Connection "";
    #     add_header Cache-Control "no-cache" always;
    #     add_header X-Accel-Buffering "no" always;
    # }

    # ---- SPA fallback (react-router) ----
    # /api/* 不走 fallback (被上面 block 截胡), 真正的 page 路由才走
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # ---- 错误兜底 ----
    error_page 404 /index.html;   # SPA: 404 也回 index.html, 让前端 router 处理
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ---- 安全头 ----
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
}
