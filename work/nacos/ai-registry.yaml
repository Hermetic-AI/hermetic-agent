# ai-registry.yaml — Nacos AI Registry example
#
# Nacos AI Registry 模式下的 MCP / Agent / Skill / Prompt 注册表. 业务方按需修改.
# 基座 hermetic-agent 不感知具体业务, 此处仅给出一个 example 模板.

ai_registry:
  mcp_servers:
    - name: example-mcp
      description: Example MCP Server. 业务方按需修改.
      protocol: streamable-http
      tools:
        - name: example_query
          description: 示例查询工具
        - name: example_action
          description: 示例动作工具
  agents:
    - name: example-agent
      description: 示例 Agent. 业务方按需修改.
      model: openai/<your-model>
      skills: [example-echo-skill]
  skills:
    - name: example-echo-skill
      version: 1.0.0
      description: 示例 SKILL — 演示 hermetic-agent SKILL 编写规范
      source: work/shared/skills/example-echo-skill
  prompts:
    - name: example-system-prompt
      description: 示例 system prompt
      content: |
        你是 hermetic-agent 示例助手...
