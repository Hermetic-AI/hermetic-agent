# ============================================================
# FH international flight booking scenario
# Source skill: ${WORK_SHARED}/skills/fh-international-flight-booking
# Transport: direct HTTP (no MCP), Token via FLIGHT_API_KEY env var
# ============================================================
name: fh_international_flight_booking
version: "1.0.0"
description: |
  FH international flight search and booking scenario.
  Direct HTTP to fh-travel backend via Bash + http_client.py.
  Token injected via FLIGHT_API_KEY env var (shared with domestic flight scenario).
  Covers intShopping, intRule, intPricing, intPolicy, waitSave,
  saveOrder, payment. Emits AGUI v2 cards.
enabled: true
tags: [travel, international-flight, booking, auip, fh-travel, direct-http]
owner: team-travel-ai
contact: travel-ai@feihe.com
tier: gold

routing:
  trigger_keywords:
    - international flight
    - international flight booking
    - book international flight
    - 国际机票
    - 出境机票
    - 跨国航班
    - intl flight
    - fh-international-flight-booking
  priority: 110

execution:
  system_prompt: |
    你是飞鹤国际机票预订助手。除非用户明确要求英文，否则所有回复、卡片标题、
    字段标签、按钮文案、错误说明都必须使用中文。

    以 fh-international-flight-booking skill 作为操作准则。

    所有 API 调用通过 bash 工具执行 Python3 脚本发起：
    ```
    python3 /work/shared/skills/fh-international-flight-booking/scripts/http_client.py <API路径> '<请求体JSON字符串>'
    ```
    Token 从环境变量 FLIGHT_API_KEY 自动注入（与国内机票共用同一 token）。
    不要使用 webfetch/file URL/MCP/curl，不要向用户索要或回显 token。
    不要尝试读取 file:// URL；需要读本地文件只能使用 read 工具。

    注意：沙箱内只有 python3（不是 python），只有 requests 库（不是 httpx）。
    http_client.py 已使用 requests 库。

    先从用户原话中提取行程信息（出发城市、到达城市、日期、舱等偏好、人数），
    不要机械询问。只有缺少下一步必需字段时才调用 ask_user 询问。

    首轮查询速度优先：用户已给出出发城市+到达城市+出发日期时，必须立即规范化并调用 intShopping。
    例如“帮我查询深圳到曼谷的明天的单程机票”已经完整：深圳=SZX，曼谷=BKK，明天=当前日期+1，
    单程=tripList 仅 1 段。此类输入禁止发 OD_INPUT/ask_user 表单，禁止要求用户重复填写。

    常用城市三字码直接内置使用，不要为这些城市读取文件：深圳=SZX，北京=PEK，上海=PVG，广州=CAN，
    香港=HKG，东京=NRT，大阪=KIX，首尔=ICN，曼谷=BKK，新加坡=SIN，吉隆坡=KUL。

    示例：用户说“帮我查询深圳到曼谷的明天的单程机票”时，直接执行：
    ```
    python3 /work/shared/skills/fh-international-flight-booking/scripts/http_client.py /air/international/intShopping '{"stopQuantity":0,"language":"cn","passengerType":"ADT","tripList":[{"fromCity":"SZX","toCity":"BKK","flyDate":"<明天yyyy-MM-dd>","isCity":true}]}'
    ```
    只有 API 返回结果后才能发送 FLIGHT_RESULT；禁止先发“正在查询”的假结果卡片。

    强制规则：
    - 查到航班后必须通过 ask_user 发送 FLIGHT_RESULT 卡片
    - 禁止发空卡片，禁止只用纯文本展示航班
    - API 调用前必须校验前置参数全部存在，已存在则直接查，不得重复确认
    - 禁止编造航班号、价格、舱位、政策结果、订单号

    必须遵守的业务阶段顺序：
    INIT → PERMISSION_CHECKED → SEARCH_PARAMS_READY → FLIGHT_LISTED
    → GROUP_SELECTED → PRICE_SELECTED → RULE_CHECKED
    → PRICING_VERIFIED → POLICY_CHECKED → WAIT_SAVE_LOADED
    → PASSENGER_FILLED → ORDER_SUBMITTED → PAYMENT_VERIFIED → FINISHED

    AUIP 卡片约定（AGUI v2）：
    - 搜索结果：FLIGHT_RESULT，body.contentJson 含 PLAIN_TEXT
    - 价格/舱位选择：PRICE_LIST，body.contentJson 含 PLAIN_TEXT
    - 退改规则：RULE_DETAIL，body.contentJson 含 PLAIN_TEXT
    - 核价变动：PRICING_VERIFY，body.contentJson 含 PLAIN_TEXT
    - 差标违反：POLICY_DECISION，body.contentJson 含 PLAIN_TEXT + BUTTON
    - 订单确认：ORDER_CONFIRM，body.contentJson 含 AIR_DOMESTIC_ORDER_SUMMARY + BUTTON
    - 下单完成：ORDER_SUCCESS
    - 无法继续：CANNOT_ORDER
  skills:
    - fh-international-flight-booking
  tools:
    - ask_user
    - bash
  orchestration: single
  hitl:
    card_schemas:
      - OD_INPUT
      - FLIGHT_RESULT
      - PRICE_LIST
      - RULE_DETAIL
      - PRICING_VERIFY
      - POLICY_DECISION
      - PASSENGER_FORM
      - OAT_BINDING
      - ORDER_CONFIRM
      - ORDER_SUCCESS
      - CANNOT_ORDER
      - CHAT_FALLBACK
    suspend_timeout: 600
    state_machine: ${WORK_SHARED}/skills/fh-international-flight-booking/schemas/state-machine.json

security:
  tool_level: full
  allowed_tools: [bash]
  denied_tools: [Read, Grep, Glob, Write, Edit, WebFetch, WebSearch]
  allowed_commands: [python3]
  denied_commands: [rm -rf, sudo, dd, mkfs, "chmod 777", ":(){:|:&};:", curl, wget]
  network: any
  max_turns: 50
  max_budget_usd: 3.0
  require_approval_for_writes: true

workspace:
  strategy: project_relative
  workspace_dirs:
    - ${PROJECT_DIR}
  readonly_dirs:
    - ${WORK_SHARED}/skills/fh-international-flight-booking
    - ${WORK_SHARED}/docs
  deny_dirs:
    - /etc
    - ~/.ssh
    - ~/.aws
    - ~/.config/gcloud
    - ${HOME}
  deny_path_patterns:
    - "**/.env"
    - "**/.env.*"
    - "**/id_rsa"
    - "**/id_ed25519"
    - "**/*.pem"
    - "**/*.key"
    - "**/secrets/**"
  launcher:
    prefer_engine: opencode
    fallback_engine: claude_code
    engine_config:
      opencode:
        config_template: standard

a2ui:
  enabled: true
  protocol: auip
  state_machine: ${WORK_SHARED}/skills/fh-international-flight-booking/schemas/state-machine.json
  default_card_timeout: 600
  ask_user:
    tool_name: ask_user
    schema: ${SCENARIO_DIR}/ask_user.schema.json
  renderer_hint: react_aui_v1
  progressive_loading: true
  card_schemas:
    - OD_INPUT
    - FLIGHT_RESULT
    - PRICE_LIST
    - PASSENGER_FORM
    - RULE_DETAIL
    - PRICING_VERIFY
    - POLICY_DECISION
    - PASSENGER_FORM
    - OAT_BINDING
    - ORDER_CONFIRM
    - ORDER_SUCCESS
    - CANNOT_ORDER
    - CHAT_FALLBACK

progressive_skill:
  strategy: all
  budget_tokens: 10000
  budget_policy: warn
  initial_skills: []
  load_on_state: {}

resource_dirs:
  skills: ${WORK_SHARED}/skills
  shared_skills: ${WORK_SHARED}/skills
  schemas: ${WORK_SHARED}/skills/fh-international-flight-booking/schemas
  workflows: ${WORK_SHARED}/skills/fh-international-flight-booking/workflows
  references: ${WORK_SHARED}/skills/fh-international-flight-booking/references
  scripts: ${WORK_SHARED}/skills/fh-international-flight-booking/scripts
  context: ${WORK_SHARED}/skills/fh-international-flight-booking/context

resources:
  agent: opencode-default
  model: MiniMax-M2.7-highspeed
  timeout: 300

metadata:
  source_skill: fh-international-flight-booking
  skill_root: ${WORK_SHARED}/skills/fh-international-flight-booking
  transport: direct-http
  token_env: FLIGHT_API_KEY
  base_url_env: FH_TRAVEL_BASE_URL
  state_machine_source: AirInternationalBookingStage
  tool_contracts: ${WORK_SHARED}/skills/fh-international-flight-booking/schemas/api-contracts.json
  sla_tier: gold
