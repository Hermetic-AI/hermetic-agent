# ============================================================
# 飞鹤差旅机票预订主流程 — 最完整业务场景
# orchestration: hitl + a2ui.enabled + progressive_skill on_demand (4000 budget)
# ============================================================
name: flight_booking
version: "1.2.0"
description: |
  飞鹤差旅 AI 助手 — 主流程为订票。
  编排: HITL (13 状态状态机, 8 个 A2UI 卡片)
  安全: standard 档, 允许 Bash/Write/Edit, 网络 local
  技能: 渐进式加载, 4 状态共享 + 13 状态各自片段
  资源: 全部落在 ${SCENARIO_DIR} 子目录下
enabled: true
tags: [travel, booking, hitl, prod]
owner: team-travel-ai
contact: travel-ai@feihe.com
tier: gold

# ============================================================
# 路由: 关键词命中 → URL 命中 (优先)
# ============================================================
routing:
  trigger_keywords: [订票, 机票, 航班, flight, book, 差旅, travel]
  trigger_intent: null
  url_path: null
  priority: 100

# ============================================================
# 执行: 13 状态状态机, on_demand skill 加载
# ============================================================
execution:
  system_prompt: |
    你是飞鹤差旅 AI 助手。你的职责: 帮员工预订国内/国际机票, 严格遵守差旅政策,
    在关键节点 (航班选择、舱位、乘机人、差标决策、订单确认) 主动询问用户。

    你的能力:
    - 查询航班 (国内/国际/单程/往返)
    - 选择舱位 (经济/超经/商务)
    - 校验差标 (舱位/价格/航司合规)
    - 提交订单 (经用户确认后)

    严禁:
    - 跳过用户确认直接下单
    - 编造航班号、价格、政策
    - 使用任何不在白名单内的工具
  skills: []                 # P6 阶段空 (P7 会接 book-flight / policy-compliance)
  tools: [query_flight_basic, get_weather, choose_cabin, submit_order]
  orchestration: hitl
  hitl:
    card_schemas: [book-flight-v1]
    suspend_timeout: 300
    # state_machine: P7 阶段填 ${SCENARIO_DIR}/state-machine.yaml

# ============================================================
# 安全: standard 档 — 允许读写 + Bash, 但禁危险命令
# ============================================================
security:
  tool_level: standard
  allowed_tools: [Read, Grep, Glob, Write, Edit, Bash, WebSearch]
  denied_tools: []
  allowed_commands: [ls, cat, grep, git, npm, pnpm, python, pytest, opencode]
  denied_commands: [rm -rf, sudo, dd, mkfs, "chmod 777", ":(){:|:&};:"]
  network: local
  max_turns: 30
  max_budget_usd: 2.0
  require_approval_for_writes: true

# ============================================================
# 工作区: project_relative — cwd 永远是 ${PROJECT_DIR}
# ============================================================
workspace:
  strategy: project_relative
  workspace_dirs:
    - ${PROJECT_DIR}
  readonly_dirs:
    - ${SCENARIO_DIR}/prompts
    - ${SCENARIO_DIR}/cards
    - ${WORK_SHARED}/docs
    - ${WORK_SHARED}/skills
  deny_dirs:
    - /etc
    - ~/.ssh
    - ~/.aws
    - ~/.config/gcloud
    - ${HOME}
  deny_path_patterns:
    - "**/.env"
    - "**/.env.*"
    - "**/id_rsa"
    - "**/id_ed25519"
    - "**/*.pem"
    - "**/*.key"
    - "**/secrets/**"
  launcher:
    prefer_engine: claude_code
    fallback_engine: opencode
    engine_config:
      claude_code:
        permission_mode: acceptEdits
        setting_sources: [project]
      opencode:
        config_template: standard

# ============================================================
# A2UI: 启用 + 8 个卡片 (cards_dir 在 P7 阶段填 yaml)
# ============================================================
a2ui:
  enabled: true
  protocol: auip
  cards_dir: ${SCENARIO_DIR}/cards
  # state_machine: P7 阶段填 ${SCENARIO_DIR}/state-machine.yaml
  default_card_timeout: 300
  ask_user:
    tool_name: ask_user
    schema: ${SCENARIO_DIR}/ask_user.schema.json
  renderer_hint: react_aui_v1
  progressive_loading: true

# ============================================================
# 渐进式 SKILL: on_demand + 4000 token 硬上限
# 13 状态各自有片段 (S01=INIT 不需要片段)
# ============================================================
progressive_skill:
  strategy: on_demand
  budget_tokens: 4000
  budget_policy: error
  initial_skills:
    - name: book-flight
      mode: summary
  load_on_state:
    S01: []
    S02:
      - book-flight:state-s02
    S03:
      - book-flight:state-s02
    S04:
      - book-flight:state-s02
    S05:
      - book-flight:state-s05
      - book-flight:cabin-rules
    S06:
      - book-flight:state-s05
      - book-flight:state-s06
    S07:
      - book-flight:state-s07
    S08:
      - book-flight:state-s08
    S09:
      - book-flight:state-s09
    S10:
      - book-flight:state-s10
    S11:
      - book-flight:state-s11
    S12:
      - book-flight:state-s12
    S13:
      - book-flight:state-s13
    F1: []
    F2:
      - book-flight:state-f02
    F3:
      - book-flight:state-f03

# ============================================================
# 资源目录: 全部在 ${SCENARIO_DIR} 下
# ============================================================
resource_dirs:
  prompts: ${SCENARIO_DIR}/prompts
  skills: ${SCENARIO_DIR}/skills
  shared_skills: ${WORK_SHARED}/skills
  mcp_servers: ${SCENARIO_DIR}/mcp
  shared_mcp: ${WORK_SHARED}/mcp
  tools: ${SCENARIO_DIR}/tools
  cards: ${SCENARIO_DIR}/cards
  state_machine: ${SCENARIO_DIR}/state-machine.yaml
  tests: ${SCENARIO_DIR}/tests

# ============================================================
# 资源分配
# ============================================================
resources:
  agent: claude-core
  model: claude-sonnet-4-5
  timeout: 300

# ============================================================
# 业务元数据
# ============================================================
metadata:
  cost_center: T-1001
  ab_group: control
  sla_tier: gold
  dashboard_url: https://grafana.example.com/d/flight_booking
