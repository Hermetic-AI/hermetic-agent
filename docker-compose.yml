# hermetic-agent 容器化部署 (Phase 1) — 统一 compose
#
# 4 个 service:
#   - nacos               (Nacos v3.2.2, 配置中心 + AI 注册表)  :28848/:28080/:29848
#   - hermetic-agent        (Sanic, L1-L3)                        :28000→8000
#   - opencode-1           (sandbox,  L4)                        :24096/:27778 (调试用)
#   - hermetic_agent-frontend   (nginx,  静态 + /api 反代)             :23000→13000  [profile: frontend]
#
# 启动模式 (2 选 1):
#   * local  (默认):   本地 Dockerfile 构建, tag = hermetic_agent:dev 等
#                      docker compose up -d --build
#                      (PULL_POLICY 默认 missing: 本地有就用, 没才拉 — 即"优先 build 产物")
#   * registry (生产): 从 registry 拉, 用 HERMETIC_AGENT_IMAGE 等
#                      PULL_POLICY=always docker compose up -d
#                      (强制从 registry 拉, 忽略本地 build 产物)
#
# 启动 frontend (默认不启, 因为 frontend 不是必需):
#   docker compose --profile frontend up -d --build
#   PULL_POLICY=always docker compose --profile frontend up -d
#
# 关键设计 (跟 agent-sandbox-overview.md §5 一致):
#   - workspace bind mount 到 host 绝对路径 (host 跟容器同路径, agent 透明)
#   - 容器根 FS --read-only, 写目录走 tmpfs / named volume
#   - 1 hub + 1 opencode 节点 (要 N 个就复制 opencode-1 块, 改 hostname)
#   - 改 model/url/key 不 rebuild 镜像:
#     走 admin API (容器内 :7778) 或 Hub 代理 (POST /agent/admin/opencode/opencode-1/policy[/env][/reload])
#     想直接调: 27778 端口已暴露 host, 可用 Swagger UI (http://localhost:27778/docs)
#
# 调试端口 (生产环境把对应 ports 段注释掉, sandbox/frontend 不应直接对外):
#   http://localhost:28080                   Nacos Console UI
#   http://localhost:28848/nacos             Nacos Client API
#   http://localhost:28000                  Hub 主 API
#   http://localhost:28000/ready            Hub 就绪检查
#   http://localhost:24096/doc              opencode 原生 OpenAPI Swagger
#   http://localhost:24096/global/health    opencode 健康
#   http://localhost:27778/docs             sandbox admin API Swagger
#   http://localhost:23000                  frontend 入口 (/api/* 反代 Hub)
#
# ----------------------------------------------------------------------------
# local / registry 二选一实现:
#   * 每个 service 同时声明 ``image:`` + ``build:`` 字段
#   * ``pull_policy: ${PULL_POLICY:-missing}``
#       - missing (默认): 本地有就用, 没才拉 (= "优先 build 产物", 跟原 build 等价)
#       - never:          严格只用本地, 缺镜像报错
#       - always:         强制从 registry 拉, 忽略本地
#   * 镜像 tag 由 ``${HERMETIC_AGENT_IMAGE:-hermetic-agent:dev}`` 等 env 决定
#   * 用 PULL_POLICY=always 触发 registry 模式 (典型: 生产 deploy)
# ----------------------------------------------------------------------------

services:
  # ============================================================
  # 0a. MinIO (asset object storage) — skill 文件
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: hermetic-agent-minio
    pull_policy: ${PULL_POLICY:-missing}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hermetic-agent-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-secret-dev}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # dev / debug; comment in prod
    volumes:
      - minio-data:/data
    networks: [sandbox-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 0b. minio-init — one-shot sidecar, creates bucket
  # ============================================================
  minio-init:
    image: minio/mc:latest
    container_name: hermetic-agent-minio-init
    pull_policy: ${PULL_POLICY:-missing}
    networks: [sandbox-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-hermetic-agent-minio} ${MINIO_ROOT_PASSWORD:-minio-secret-dev} &&
      mc mb -p local/${MINIO_BUCKET_SKILLS:-hermetic-agent-skills} || true &&
      echo 'minio-init done'
      "
    restart: "no"

  # ============================================================
  # 0. Nacos v3.2.2 (配置中心 + AI 注册表: MCP/Agent/Skill/Prompt)
  # ============================================================
  nacos:
    image: nacos/nacos-server:v3.2.2
    container_name: hermetic-agent-nacos
    pull_policy: ${PULL_POLICY:-missing}
    restart: unless-stopped
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      - NACOS_AUTH_TOKEN=${NACOS_AUTH_TOKEN:-VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkw}
      - NACOS_AUTH_IDENTITY_KEY=${NACOS_AUTH_IDENTITY_KEY:-hermetic_agent}
      - NACOS_AUTH_IDENTITY_VALUE=${NACOS_AUTH_IDENTITY_VALUE:-hermetic_agent}
      - JVM_XMS=256m
      - JVM_XMX=256m
      - JVM_XMN=128m
    ports:
      - "28080:8080"
      - "28848:8848"
      - "29848:9848"
    networks: [sandbox-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:8848/nacos/ | grep -q 200"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ============================================================
  # 1. hermetic-agent (主服务, L1-L3, Sanic + scenarios + skills)
  # ============================================================
  hermetic-agent:
    image: ${HERMETIC_AGENT_IMAGE:-hermetic-agent:dev}
    build:
      context: .
      dockerfile: docker/hermetic-agent/Dockerfile
    pull_policy: ${PULL_POLICY:-missing}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "28000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - MCP_TOKEN=${MCP_TOKEN:-}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LLM_PAYLOAD=${LOG_LLM_PAYLOAD:-true}
      - FORCE_COLOR=1
      - TERM=xterm-256color
      - WORK_ROOT=/app/work
      - SCENARIO_PATHS=["/app/work/scenarios"]
      - WORKSPACE_PATH=${WORKSPACE_PATH:-/work/tenant-A/project-1}
      - NACOS_SERVER_ADDR=nacos:8848
      - NACOS_NAMESPACE=6375a990-9df8-4783-a7fe-fb3a3effba93
      - NACOS_ENABLED=${NACOS_ENABLED:-true}
      - AGENT_SCHEDULER_MINIO_ENDPOINT=minio:9000
      - AGENT_SCHEDULER_MINIO_SECURE=false
      - AGENT_SCHEDULER_MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-hermetic-agent-minio}
      - AGENT_SCHEDULER_MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minio-secret-dev}
      - AGENT_SCHEDULER_MINIO_BUCKET_SKILLS=${MINIO_BUCKET_SKILLS:-hermetic-agent-skills}
      - AGENT_SCHEDULER_ASSET_BACKEND=minio
    depends_on:
      nacos:
        condition: service_healthy
      opencode-1:
        condition: service_healthy
    networks: [sandbox-net]
    volumes:
      - ./work:/app/work:ro
    # 开发模式 (取消注释):
    # volumes:
    #   - ./:/app
    # command: ["python", "-m", "hermetic_agent.main", "--reload"]

  # ============================================================
  # 2. opencode 节点 (L4 sandbox, 1 个 — 要 N 个就复制)
  # ============================================================
  opencode-1:
    image: ${OPENCODE_SANDBOX_IMAGE:-opencode-sandbox:dev}
    build:
      context: .
      dockerfile: docker/opencode/Dockerfile
    pull_policy: ${PULL_POLICY:-missing}
    hostname: opencode-1
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges
    mem_limit: 2g
    cpus: "2.0"
    pids_limit: 128
    tmpfs:
      - /tmp:size=200m,mode=1777
      - /root/.config:size=300m,mode=0755
      - /root/.local:size=100m,mode=0755
      - /root/.npm:size=200m,mode=0755
      - /root/.cache:size=200m,mode=0755
      - /root/.mcporter:size=50m,mode=0755
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - MCP_TOKEN=${MCP_TOKEN:-}
      - MCPORTER_ENABLED=${MCPORTER_ENABLED:-false}
      - MCPORTER_CONFIG_PATH=${MCPORTER_CONFIG_PATH:-/opt/sandbox/mcporter.json}
      - MCPORTER_SERVERS=${MCPORTER_SERVERS:-}
      - WORKSPACE_CWD=${WORKSPACE_PATH:-/work/tenant-A/project-1}
      - OPENCODE_PORT=14096
      - OPENCODE_HOST=0.0.0.0
      - HEALTH_PORT=7777
    volumes:
      - ${WORKSPACE_PATH:-/work/tenant-A/project-1}:${WORKSPACE_PATH:-/work/tenant-A/project-1}
      - ${SKILLS_SHARED_DIR:-./work/shared/skills}:/work/shared/skills:ro
      - ./work/mcp/mcporter.json:/opt/sandbox/mcporter.json:ro
      - opencode-1-runtime:/tmp/opencode-sandbox
    networks: [sandbox-net]
    ports:
      - "24096:14096"
      - "27778:7778"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7777/healthz"]
      interval: 5s
      timeout: 2s
      start_period: 10s
      retries: 3

  # ============================================================
  # 3. hermetic_agent Frontend (nginx serve 静态 + /api 反代 Hub)
  #    默认不启, 启用: --profile frontend
  # ============================================================
  hermetic_agent-frontend:
    profiles: ["frontend"]
    image: ${HERMETIC_AGENT_FRONTEND_IMAGE:-hermetic_agent-frontend:dev}
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_BACKEND_URL: /api
    pull_policy: ${PULL_POLICY:-missing}
    hostname: hermetic_agent-frontend
    restart: unless-stopped
    # 不开 ``read_only: true`` — 跟 nginx 官方 entrypoint 的 chown 行为不兼容.
    # 不 ``cap_drop: [ALL]`` — 那样会丢 CAP_CHOWN / CAP_SETUID / CAP_SETGID,
    # nginx master (root) 没法 chown + setuid/setgid 切到 nginx 用户启 worker.
    # 改用: cap_drop 显式列出要丢的 (保留 CHOWN/SETUID/SETGID/DAC_OVERRIDE),
    # 仍保留 no-new-privileges 加固. frontend 只 serve 静态 + 反代, 没
    # untrusted code, 安全风险低.
    cap_drop:
      - SYS_ADMIN
      - SYS_MODULE
      - SYS_RAWIO
      - SYS_PTRACE
      - SYS_BOOT
      - NET_RAW
      - SYS_TIME
      - SYSLOG
      - MKNOD
      - AUDIT_WRITE
      - SETFCAP
    security_opt:
      - no-new-privileges
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 64
    # nginx 写目录仍用 tmpfs (性能 + 不污染镜像层, 容器删了就没)
    tmpfs:
      - /var/cache/nginx:size=50m,mode=0755
      - /var/run:size=10m,mode=0755
      - /var/log/nginx:size=20m,mode=0755
      - /tmp:size=20m,mode=1777
    ports:
      - "23000:13000"
    networks: [sandbox-net]
    depends_on:
      hermetic-agent:
        condition: service_started
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- -T 2 http://127.0.0.1:13000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  opencode-1-runtime:
    # 命名 volume: 容器 recreate 时保留 runtime overlay (admin API 写的
    # env.runtime / policy.runtime.json).  清理: docker compose down -v
  minio-data:
    # 命名 volume: MinIO 对象存储持久化.  清理: docker compose down -v

networks:
  sandbox-net:
    driver: bridge
    name: hermetic_agent-sandbox-net
