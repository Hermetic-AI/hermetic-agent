# OpenAgent 容器化部署 (Phase 1) — 统一 compose
#
# 3 个 service:
#   - openagent-hub      (Sanic, L1-L3)               :18000→8000
#   - opencode-1         (sandbox,  L4)               :14096/:7778 (调试用)
#   - openagent-frontend (nginx,  静态 + /api 反代)    :13000→3000  [profile: frontend]
#
# 启动模式 (2 选 1):
#   * local  (默认):   本地 Dockerfile 构建, tag = openagent:dev 等
#                      docker compose up -d --build
#                      (PULL_POLICY 默认 missing: 本地有就用, 没才拉 — 即"优先 build 产物")
#   * registry (生产): 从 registry 拉, 用 OPENAGENT_HUB_IMAGE 等
#                      PULL_POLICY=always docker compose up -d
#                      (强制从 registry 拉, 忽略本地 build 产物)
#
# 启动 frontend (默认不启, 因为 frontend 不是必需):
#   docker compose --profile frontend up -d --build
#   PULL_POLICY=always docker compose --profile frontend up -d
#
# 关键设计 (跟 agent-sandbox-overview.md §5 一致):
#   - workspace bind mount 到 host 绝对路径 (host 跟容器同路径, agent 透明)
#   - 容器根 FS --read-only, 写目录走 tmpfs / named volume
#   - 1 hub + 1 opencode 节点 (要 N 个就复制 opencode-1 块, 改 hostname)
#   - 改 model/url/key 不 rebuild 镜像:
#     走 admin API (容器内 :7778) 或 Hub 代理 (POST /agent/admin/opencode/opencode-1/policy[/env][/reload])
#     想直接调: 7778 端口已暴露 host, 可用 Swagger UI (http://localhost:7778/docs)
#
# 调试端口 (生产环境把对应 ports 段注释掉, sandbox/frontend 不应直接对外):
#   http://localhost:18000                 Hub 主 API
#   http://localhost:18000/ready          Hub 就绪检查
#   http://localhost:14096/doc            opencode 原生 OpenAPI Swagger
#   http://localhost:14096/global/health  opencode 健康
#   http://localhost:7778/docs            sandbox admin API Swagger
#   http://localhost:13000                frontend 入口 (/api/* 反代 Hub)
#
# ----------------------------------------------------------------------------
# local / registry 二选一实现:
#   * 每个 service 同时声明 ``image:`` + ``build:`` 字段
#   * ``pull_policy: ${PULL_POLICY:-missing}``
#       - missing (默认): 本地有就用, 没才拉 (= "优先 build 产物", 跟原 build 等价)
#       - never:          严格只用本地, 缺镜像报错
#       - always:         强制从 registry 拉, 忽略本地
#   * 镜像 tag 由 ``${OPENAGENT_HUB_IMAGE:-openagent:dev}`` 等 env 决定
#   * 用 PULL_POLICY=always 触发 registry 模式 (典型: 生产 deploy)
# ----------------------------------------------------------------------------

services:
  # ============================================================
  # 1. OpenAgent Hub (主服务, L1-L3, Sanic + scenarios + skills)
  # ============================================================
  openagent-hub:
    image: ${OPENAGENT_HUB_IMAGE:-openagent:dev}
    build:
      context: .
      dockerfile: docker/Dockerfile.openagent
    pull_policy: ${PULL_POLICY:-missing}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "18000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - FLIGHT_API_KEY=${FLIGHT_API_KEY:-}
      - PYTHONUNBUFFERED=1
      - AGENT_SCHEDULER_LOG_LEVEL=${AGENT_SCHEDULER_LOG_LEVEL:-INFO}
      - AGENT_SCHEDULER_LOG_FORMAT=${AGENT_SCHEDULER_LOG_FORMAT:-json}
      - AGENT_SCHEDULER_LOG_LLM_PAYLOAD=${AGENT_SCHEDULER_LOG_LLM_PAYLOAD:-true}
      - FORCE_COLOR=1
      - TERM=xterm-256color
      - AGENT_SCHEDULER_WORK_ROOT=/app/work
      - AGENT_SCHEDULER_SCENARIO_PATHS=["/app/work/scenarios"]
      - WORKSPACE_PATH=${WORKSPACE_PATH:-/work/tenant-A/project-1}
    depends_on:
      opencode-1:
        condition: service_healthy
    networks: [sandbox-net]
    volumes:
      - ./work:/app/work:ro
    # 开发模式 (取消注释):
    # volumes:
    #   - ./:/app
    # command: ["python", "-m", "openagent.main", "--reload"]

  # ============================================================
  # 2. opencode 节点 (L4 sandbox, 1 个 — 要 N 个就复制)
  # ============================================================
  opencode-1:
    image: ${OPENCODE_SANDBOX_IMAGE:-opencode-sandbox:dev}
    build:
      context: .
      dockerfile: docker/Dockerfile.opencode-sandbox
    pull_policy: ${PULL_POLICY:-missing}
    hostname: opencode-1
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges
    mem_limit: 2g
    cpus: "2.0"
    pids_limit: 128
    tmpfs:
      - /tmp:size=200m,mode=1777
      - /root/.config:size=300m,mode=0755
      - /root/.local:size=100m,mode=0755
      - /root/.npm:size=200m,mode=0755
      - /root/.cache:size=200m,mode=0755
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - FLIGHT_API_KEY=${FLIGHT_API_KEY:-}
      - WORKSPACE_CWD=${WORKSPACE_PATH:-/work/tenant-A/project-1}
      - OPENCODE_PORT=14096
      - OPENCODE_HOST=0.0.0.0
      - HEALTH_PORT=7777
    volumes:
      - ${WORKSPACE_PATH:-/work/tenant-A/project-1}:${WORKSPACE_PATH:-/work/tenant-A/project-1}
      - ${SKILLS_SHARED_DIR:-./work/shared/skills}:/work/shared/skills:ro
      - opencode-1-runtime:/tmp/opencode-sandbox
    networks: [sandbox-net]
    ports:
      - "14096:14096"
      - "7778:7778"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7777/healthz"]
      interval: 5s
      timeout: 2s
      start_period: 10s
      retries: 3

  # ============================================================
  # 3. OpenAgent Frontend (nginx serve 静态 + /api 反代 Hub)
  #    默认不启, 启用: --profile frontend
  # ============================================================
  openagent-frontend:
    profiles: ["frontend"]
    image: ${OPENAGENT_FRONTEND_IMAGE:-openagent-frontend:dev}
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_BACKEND_URL: /api
    pull_policy: ${PULL_POLICY:-missing}
    hostname: openagent-frontend
    restart: unless-stopped
    # 不开 ``read_only: true`` — 跟 nginx 官方 entrypoint 的 chown 行为不兼容.
    # 不 ``cap_drop: [ALL]`` — 那样会丢 CAP_CHOWN / CAP_SETUID / CAP_SETGID,
    # nginx master (root) 没法 chown + setuid/setgid 切到 nginx 用户启 worker.
    # 改用: cap_drop 显式列出要丢的 (保留 CHOWN/SETUID/SETGID/DAC_OVERRIDE),
    # 仍保留 no-new-privileges 加固. frontend 只 serve 静态 + 反代, 没
    # untrusted code, 安全风险低.
    cap_drop:
      - SYS_ADMIN
      - SYS_MODULE
      - SYS_RAWIO
      - SYS_PTRACE
      - SYS_BOOT
      - NET_RAW
      - SYS_TIME
      - SYSLOG
      - MKNOD
      - AUDIT_WRITE
      - SETFCAP
    security_opt:
      - no-new-privileges
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 64
    # nginx 写目录仍用 tmpfs (性能 + 不污染镜像层, 容器删了就没)
    tmpfs:
      - /var/cache/nginx:size=50m,mode=0755
      - /var/run:size=10m,mode=0755
      - /var/log/nginx:size=20m,mode=0755
      - /tmp:size=20m,mode=1777
    ports:
      - "13000:13000"
    networks: [sandbox-net]
    depends_on:
      openagent-hub:
        condition: service_started
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- -T 2 http://127.0.0.1:13000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  opencode-1-runtime:
    # 命名 volume: 容器 recreate 时保留 runtime overlay (admin API 写的
    # env.runtime / policy.runtime.json).  清理: docker compose down -v

networks:
  sandbox-net:
    driver: bridge
    name: openagent-sandbox-net
